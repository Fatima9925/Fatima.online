<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{--w:#fff;--c:#f7f5f2;--b:#1a1614;--g:#a07840;--gl:#c4a060;--m:#999;--bd:#e5e0d8;--sh:rgba(0,0,0,.06);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--c);color:var(--b);overflow-x:hidden;}
img{display:block;max-width:100%;}
a,button{cursor:pointer;font-family:'DM Sans',sans-serif;}
/* LOADER */
#ld{position:fixed;inset:0;background:var(--w);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;transition:opacity .5s;}
#ld.out{opacity:0;pointer-events:none;}
#ld h1{font-family:'Playfair Display',serif;font-size:2rem;letter-spacing:8px;color:var(--b);font-weight:400;}
#ld p{font-size:.65rem;letter-spacing:6px;color:var(--g);text-transform:uppercase;}
.ld-ln{width:120px;height:1px;background:var(--bd);overflow:hidden;margin-top:8px;}
.ld-f{height:100%;background:var(--g);animation:lf 1.5s ease forwards;}
@keyframes lf{from{width:0}to{width:100%}}
/* ANN */
#ann{background:var(--b);color:rgba(255,255,255,.8);text-align:center;padding:9px;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;}
/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;}
.logo{font-family:'Playfair Display',serif;font-size:1.25rem;letter-spacing:5px;color:var(--b);font-weight:400;cursor:pointer;display:flex;flex-direction:column;line-height:1.1;}
.logo small{font-size:.5rem;letter-spacing:7px;color:var(--g);text-transform:uppercase;}
.nl{display:flex;gap:26px;list-style:none;}
.nl a{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--m);font-weight:400;transition:color .2s;cursor:pointer;}
.nl a:hover,.nl a.on{color:var(--b);}
.nr{display:flex;align-items:center;gap:10px;}
.ico{background:none;border:none;color:var(--m);width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:color .2s;}
.ico:hover{color:var(--b);}
.cb{background:var(--b);color:#fff;border:none;padding:7px 18px;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;font-weight:500;transition:background .2s;position:relative;}
.cb:hover{background:var(--g);}
.cbg{position:absolute;top:-6px;right:-6px;background:var(--g);color:#fff;width:15px;height:15px;border-radius:50%;font-size:.55rem;display:flex;align-items:center;justify-content:center;}
.hbg{display:none;flex-direction:column;gap:4px;background:none;border:none;padding:3px;}
.hbg span{width:20px;height:1px;background:var(--b);display:block;transition:all .3s;}
.hbg.x span:nth-child(1){transform:rotate(45deg) translate(3.5px,3.5px);}
.hbg.x span:nth-child(2){opacity:0;}
.hbg.x span:nth-child(3){transform:rotate(-45deg) translate(3.5px,-3.5px);}
/* SEARCH */
.sw{max-height:0;overflow:hidden;transition:max-height .3s;background:var(--w);border-bottom:1px solid var(--bd);}
.sw.open{max-height:60px;}
.si{display:flex;gap:8px;padding:12px 40px;}
.sinp{flex:1;background:var(--c);border:1px solid var(--bd);color:var(--b);padding:9px 14px;font-size:.83rem;outline:none;}
.sinp:focus{border-color:var(--g);}
.sinp::placeholder{color:var(--m);}
.sres{position:fixed;left:0;right:0;background:var(--w);border-bottom:1px solid var(--bd);z-index:199;padding:10px 40px;display:none;flex-wrap:wrap;gap:6px;box-shadow:0 6px 20px var(--sh);}
.stg{background:var(--c);border:1px solid var(--bd);color:var(--b);padding:4px 12px;font-size:.71rem;cursor:pointer;transition:all .2s;}
.stg:hover{background:var(--b);color:#fff;}
/* PAGES */
.pg{display:none;}.pg.on{display:block;}
/* HERO */
.hero{display:grid;grid-template-columns:1fr 1fr;min-height:86vh;}
.hl{padding:70px 40px;display:flex;flex-direction:column;justify-content:center;background:var(--w);}
.hr{background:var(--c);display:grid;grid-template-columns:1fr 1fr;gap:1px;overflow:hidden;}
.hcard{overflow:hidden;cursor:pointer;position:relative;}
.hcard img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.hcard:hover img{transform:scale(1.04);}
.hcard-ph{width:100%;min-height:200px;height:100%;background:#ece8e1;display:flex;align-items:center;justify-content:center;}
.hcard-ph span{font-family:'Playfair Display',serif;font-size:.75rem;color:var(--m);letter-spacing:2px;font-style:italic;}
.hcard-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(26,22,20,.55);color:#fff;padding:10px 12px;}
.hcard-lbl p{font-family:'Playfair Display',serif;font-size:.78rem;}
.hcard-lbl span{font-size:.62rem;color:rgba(255,255,255,.7);}
.heye{font-size:.62rem;letter-spacing:5px;text-transform:uppercase;color:var(--g);margin-bottom:16px;}
.htit{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,4.5vw,4.2rem);line-height:1.06;color:var(--b);margin-bottom:16px;font-weight:400;}
.htit em{font-style:italic;color:var(--g);}
.hdesc{font-size:.85rem;color:var(--m);line-height:1.8;margin-bottom:28px;max-width:380px;}
.hcta{display:flex;gap:10px;flex-wrap:wrap;}
.bs{background:var(--b);color:#fff;border:none;padding:12px 28px;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:500;transition:background .2s;display:inline-block;}
.bs:hover{background:var(--g);}
.bo{background:none;color:var(--b);border:1px solid var(--b);padding:12px 28px;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:500;transition:all .2s;display:inline-block;cursor:pointer;}
.bo:hover{border-color:var(--g);color:var(--g);}
/* STRIP */
.strip{background:var(--w);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);display:flex;}
.strip-item{flex:1;text-align:center;padding:18px 10px;border-right:1px solid var(--bd);font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--m);}
.strip-item:last-child{border-right:none;}
.strip-item strong{display:block;font-family:'Playfair Display',serif;font-size:.88rem;color:var(--b);font-weight:400;margin-bottom:2px;}
/* BANNER */
.ban-wrap{position:relative;overflow:hidden;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);}
.ban-ph{width:100%;height:320px;background:linear-gradient(135deg,#ece8e1,#e4ddd3);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--m);letter-spacing:3px;font-style:italic;}
.ban-img{width:100%;height:320px;object-fit:cover;display:block;}
.ban-ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.9) 32%,transparent 62%);display:flex;align-items:center;padding:50px;}
.ban-ov h2{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,2.4rem);font-weight:400;letter-spacing:2px;margin-bottom:8px;}
.ban-ov p{font-size:.8rem;color:var(--m);margin-bottom:20px;}
/* SECTION TITLE */
.stitle{text-align:center;padding:50px 20px 28px;}
.stitle h2{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,3vw,1.9rem);font-weight:400;letter-spacing:2px;}
.stitle hr{width:36px;height:1px;background:var(--g);border:none;margin:10px auto 0;}
/* CATS */
.cats-row{display:flex;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.cat{flex:1;min-width:100px;background:var(--w);border-right:1px solid var(--bd);padding:22px 12px;text-align:center;cursor:pointer;transition:background .2s;position:relative;overflow:hidden;}
.cat:last-child{border-right:none;}
.cat:hover{background:var(--c);}
.cat h3{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:400;color:var(--b);letter-spacing:1px;}
.cat p{font-size:.6rem;color:var(--m);margin-top:3px;}
.cat-bar{position:absolute;bottom:0;left:0;width:0;height:1.5px;background:var(--g);transition:width .3s;}
.cat:hover .cat-bar{width:100%;}
/* PRODUCT GRIDS */
.fg4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);}
.sg-all{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--bd);}
/* PRODUCT CARD */
.pc{background:var(--w);cursor:pointer;position:relative;overflow:hidden;}
.pc:hover .pimg{transform:scale(1.04);}
.pc:hover .pover{opacity:1;}
.piw{overflow:hidden;aspect-ratio:3/4;background:var(--c);}
.pimg{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.pph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.pph span{font-family:'Playfair Display',serif;font-size:.72rem;color:var(--m);font-style:italic;text-align:center;padding:0 10px;}
.pbdg{position:absolute;top:10px;left:10px;background:var(--b);color:#fff;font-size:.56rem;letter-spacing:2px;padding:3px 8px;text-transform:uppercase;}
.pbdg.sale{background:var(--g);}
.pover{position:absolute;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--bd);padding:9px;display:grid;grid-template-columns:1fr auto;gap:5px;opacity:0;transition:opacity .25s;}
.badd{background:var(--b);color:#fff;border:none;padding:8px;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;transition:background .2s;}
.badd:hover{background:var(--g);}
.bwa{background:none;border:1px solid #25d366;color:#25d366;padding:8px 10px;font-size:.75rem;transition:all .2s;}
.bwa:hover{background:#25d366;color:#fff;}
.pinfo{padding:12px 14px 16px;}
.pcat{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--g);margin-bottom:3px;}
.pname{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:400;color:var(--b);margin-bottom:4px;}
.ppr{font-size:.82rem;color:var(--b);font-weight:500;}
.ppold{font-size:.72rem;color:var(--m);text-decoration:line-through;margin-left:4px;}
/* SHOP HDR */
.shop-hdr{background:var(--w);border-bottom:1px solid var(--bd);padding:18px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.shop-hdr h2{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:400;letter-spacing:3px;}
.shop-hdr p{font-size:.67rem;color:var(--m);}
.shop-top{background:var(--w);border-bottom:1px solid var(--bd);padding:11px 40px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fp{background:none;border:1px solid var(--bd);color:var(--m);padding:5px 13px;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;font-family:'DM Sans',sans-serif;}
.fp.on,.fp:hover{background:var(--b);color:#fff;border-color:var(--b);}
.fsort{background:var(--c);border:1px solid var(--bd);color:var(--b);padding:5px 9px;font-size:.72rem;outline:none;font-family:'DM Sans',sans-serif;margin-left:auto;}
/* ABOUT */
.abt{background:var(--w);border-top:1px solid var(--bd);text-align:center;padding:60px 40px;}
.abt h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400;letter-spacing:3px;margin-bottom:14px;}
.abt p{font-size:.82rem;color:var(--m);line-height:1.9;max-width:500px;margin:0 auto;}
.abt hr{width:36px;height:1px;background:var(--g);border:none;margin:12px auto;}
/* FOOTER */
footer{background:var(--b);color:rgba(255,255,255,.5);}
.ftg{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;border-top:1px solid rgba(255,255,255,.07);}
.ftcol{padding:36px 26px;border-right:1px solid rgba(255,255,255,.05);}
.ftcol:last-child{border-right:none;}
.ftlogo{font-family:'Playfair Display',serif;font-size:1.2rem;letter-spacing:5px;color:#fff;font-weight:400;display:block;margin-bottom:9px;}
.ftlogo small{font-size:.5rem;letter-spacing:6px;color:var(--g);display:block;}
.ftcol>p{font-size:.74rem;line-height:1.85;max-width:200px;}
.ftcol h4{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:13px;font-weight:400;}
.ftcol ul{list-style:none;}
.ftcol li{margin-bottom:8px;}
.ftcol a{font-size:.74rem;color:rgba(255,255,255,.42);cursor:pointer;transition:color .2s;}
.ftcol a:hover{color:var(--gl);}
.wa-btn{display:inline-flex;align-items:center;gap:6px;background:#25d366;color:#fff;padding:7px 13px;font-size:.67rem;font-weight:600;margin-top:11px;}
.ftbot{border-top:1px solid rgba(255,255,255,.05);padding:13px 26px;display:flex;justify-content:space-between;align-items:center;}
.ftc{font-size:.6rem;color:rgba(255,255,255,.22);}
.fttap{font-size:.6rem;color:rgba(255,255,255,.22);padding:6px 10px;cursor:default;user-select:none;}
/* CART */
.crt{position:fixed;right:0;top:0;bottom:0;width:355px;max-width:100vw;background:var(--w);z-index:600;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid var(--bd);box-shadow:-6px 0 24px var(--sh);}
.crt.open{transform:translateX(0);}
.crth{padding:17px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.crth h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;letter-spacing:2px;}
.xb{background:none;border:none;color:var(--m);font-size:1.2rem;}
.crtb{flex:1;overflow-y:auto;}
.ci{display:flex;border-bottom:1px solid var(--bd);}
.ciimg{width:78px;height:97px;object-fit:cover;background:var(--c);flex-shrink:0;}
.ciimg.ph{display:flex;align-items:center;justify-content:center;font-size:.5rem;color:var(--m);padding:3px;text-align:center;}
.cinf{flex:1;padding:11px 13px;}
.cinm{font-family:'Playfair Display',serif;font-size:.82rem;font-weight:400;margin-bottom:2px;}
.cipr{color:var(--g);font-size:.75rem;font-weight:500;}
.ciq{display:flex;align-items:center;gap:6px;margin-top:7px;}
.qb{background:none;border:1px solid var(--bd);color:var(--b);width:22px;height:22px;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.qb:hover{background:var(--b);color:#fff;border-color:var(--b);}
.qv{font-size:.78rem;min-width:14px;text-align:center;}
.cirm{background:none;border:none;color:var(--m);font-size:.6rem;text-transform:uppercase;letter-spacing:1px;margin-top:3px;display:block;}
.crtf{padding:15px 20px;border-top:1px solid var(--bd);}
.tot{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.tot strong{font-family:'Playfair Display',serif;font-size:.93rem;font-weight:400;}
.tot span{font-size:.93rem;color:var(--g);font-weight:500;}
.bco{width:100%;background:#25d366;color:#fff;border:none;padding:11px;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s;}
.bco:hover{background:#1da851;}
.empty-cart{text-align:center;padding:40px 16px;font-size:.78rem;color:var(--m);}
/* SETTINGS */
.setp{position:fixed;right:0;top:0;bottom:0;width:275px;max-width:100vw;background:var(--w);z-index:600;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);border-left:1px solid var(--bd);display:flex;flex-direction:column;box-shadow:-6px 0 24px var(--sh);}
.setp.open{transform:translateX(0);}
.seth{padding:17px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.seth h3{font-family:'Playfair Display',serif;font-size:.93rem;font-weight:400;letter-spacing:2px;}
.setb{padding:20px;flex:1;}
.sgreet{font-family:'Playfair Display',serif;font-size:1rem;color:var(--g);margin-bottom:18px;font-style:italic;}
.srow{margin-bottom:12px;}
.srow label{display:block;font-size:.57rem;letter-spacing:2px;text-transform:uppercase;color:var(--m);margin-bottom:4px;}
.srow select{width:100%;background:var(--c);border:1px solid var(--bd);color:var(--b);padding:7px 9px;font-size:.79rem;outline:none;font-family:'DM Sans',sans-serif;}
/* PASSWORD */
.pov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:800;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:16px;}
.pov.open{opacity:1;pointer-events:all;}
.pbox{background:var(--w);padding:34px 30px;max-width:310px;width:100%;text-align:center;}
.pbox h3{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:400;margin-bottom:4px;letter-spacing:2px;}
.pbox p{font-size:.7rem;color:var(--m);margin-bottom:18px;}
.pinp{width:100%;background:var(--c);border:1px solid var(--bd);color:var(--b);padding:10px 13px;font-size:.88rem;text-align:center;letter-spacing:3px;outline:none;margin-bottom:8px;font-family:'DM Sans',sans-serif;}
.pinp:focus{border-color:var(--g);}
.perr{color:#c0392b;font-size:.67rem;margin-bottom:7px;display:none;}
.pbtns{display:flex;gap:6px;}
.pcan{flex:1;background:none;border:1px solid var(--bd);color:var(--m);padding:8px;font-size:.64rem;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;}
.pcan:hover{border-color:var(--b);color:var(--b);}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:700;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:14px;}
.mov.open{opacity:1;pointer-events:all;}
.mbox{background:var(--w);max-width:740px;width:100%;max-height:92vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.mx{position:absolute;top:10px;right:10px;background:none;border:1px solid var(--bd);color:var(--b);width:27px;height:27px;display:flex;align-items:center;justify-content:center;font-size:.82rem;z-index:2;transition:all .2s;}
.mx:hover{background:var(--b);color:#fff;}
.mgal{background:var(--c);}
.mmain{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
.mmain.ph{display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.8rem;color:var(--m);font-style:italic;}
.mthumbs{display:flex;gap:3px;padding:6px;}
.mth{width:46px;height:58px;object-fit:cover;cursor:pointer;border:1.5px solid transparent;flex-shrink:0;transition:border-color .2s;}
.mth.on{border-color:var(--g);}
.minf{padding:26px 20px;display:flex;flex-direction:column;overflow-y:auto;}
.mcat{font-size:.55rem;letter-spacing:3px;text-transform:uppercase;color:var(--g);margin-bottom:3px;}
.mnm{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:400;margin-bottom:7px;}
.mpr{font-size:1.05rem;color:var(--b);font-weight:500;}
.mprold{font-size:.78rem;color:var(--m);text-decoration:line-through;margin-left:4px;}
.mdesc{font-size:.79rem;color:var(--m);line-height:1.8;margin:10px 0;flex:1;}
.mhr{border:none;border-top:1px solid
