<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — AI Video Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0f1219;
    --panel: #13161f;
    --border: #1e2330;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --accent3: #a855f7;
    --text: #e8ecf5;
    --muted: #4a5168;
    --muted2: #2a2f40;
    --ai: #00e5ff;
    --timeline: #0c0e15;
    --track1: #1a1040;
    --track2: #0d1a12;
    --track3: #1a0d12;
    --glow: 0 0 20px rgba(0,229,255,0.15);
    --glow2: 0 0 20px rgba(255,77,109,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
    flex-shrink: 0;
    z-index: 100;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-right: 12px;
  }
  .topbar-btn {
    height: 28px;
    padding: 0 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
  .topbar-btn.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }
  .topbar-btn.primary:hover { background: #00c8e0; }
  .spacer { flex: 1; }
  .project-name {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── MAIN LAYOUT ── */
  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 220px 1fr 300px;
    grid-template-rows: 1fr 200px;
    overflow: hidden;
    min-height: 0;
  }

  /* ── MEDIA PANEL ── */
  .media-panel {
    background: var(--panel);
    border-right: 1px solid var(--border);
    grid-row: 1 / 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-header span { color: var(--accent); }
  .media-import {
    margin: 10px;
    border: 1px dashed var(--muted2);
    border-radius: 6px;
    padding: 16px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .media-import:hover { border-color: var(--accent); background: rgba(0,229,255,0.03); }
  .media-import input { position: absolute; inset:0; opacity:0; cursor:pointer; }
  .media-import .icon { font-size: 22px; margin-bottom: 6px; }
  .media-import p { font-size: 10px; color: var(--muted); line-height: 1.5; }
  .media-list { flex: 1; overflow-y: auto; padding: 6px; }
  .media-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .media-item:hover { background: var(--muted2); }
  .media-item.active { background: rgba(0,229,255,0.08); border-color: rgba(0,229,255,0.2); }
  .media-thumb {
    width: 42px; height: 28px;
    border-radius: 3px;
    object-fit: cover;
    background: var(--muted2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .media-info { flex: 1; min-width: 0; }
  .media-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .media-meta { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* ── PREVIEW ── */
  .preview-area {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .preview-screen {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #previewVideo {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }
  .preview-placeholder {
    text-align: center;
    color: var(--muted);
  }
  .preview-placeholder .big-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
  .preview-placeholder p { font-size: 12px; font-family: 'DM Mono', monospace; }
  .playhead-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--muted2);
  }
  .playhead-progress {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    width: 0%;
    transition: width 0.1s linear;
  }
  /* Overlay controls */
  .preview-controls {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(8,10,15,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 6px 14px;
  }
  .ctrl-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { background: var(--muted2); }
  .ctrl-btn.play-main {
    width: 36px; height: 36px;
    background: var(--accent);
    color: var(--bg);
    font-size: 15px;
  }
  .ctrl-btn.play-main:hover { background: #00c8e0; }
  .timecode {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    min-width: 80px;
    text-align: center;
  }

  /* ── AI PANEL ── */
  .ai-panel {
    background: var(--panel);
    border-left: 1px solid var(--border);
    grid-row: 1 / 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .ai-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ai-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--bg);
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    padding: 2px 7px;
    border-radius: 3px;
  }
  .ai-title { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .ai-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .ai-tab {
    flex: 1;
    padding: 8px 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .ai-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .ai-tab:hover { color: var(--text); }

  .ai-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .tab-pane { display: none; flex-direction: column; flex: 1; }
  .tab-pane.active { display: flex; }

  /* Chat tab */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    display: flex;
    gap: 8px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    margin-top: 2px;
  }
  .msg.user .msg-avatar { background: var(--accent3); }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent3)); }
  .msg-bubble {
    max-width: calc(100% - 36px);
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.6;
    font-family: 'DM Mono', monospace;
  }
  .msg.user .msg-bubble { background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.2); color: var(--text); }
  .msg.ai .msg-bubble { background: rgba(0,229,255,0.06); border: 1px solid rgba(0,229,255,0.15); color: #b8d4da; }
  .msg.ai .msg-bubble.thinking { color: var(--muted); font-style: italic; }
  .chat-input-area {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    resize: none;
    outline: none;
    min-height: 34px;
    max-height: 80px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .send-btn {
    width: 34px; height: 34px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: var(--bg);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .send-btn:hover { background: #00c8e0; }
  .send-btn:disabled { background: var(--muted2); color: var(--muted); cursor: not-allowed; }

  /* Tools tab */
  .tools-grid { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .tool-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .tool-card:hover { border-color: var(--accent); background: rgba(0,229,255,0.04); box-shadow: var(--glow); }
  .tool-card .t-icon { font-size: 20px; margin-bottom: 5px; }
  .tool-card .t-name { font-size: 10px; font-weight: 700; color: var(--text); }
  .tool-card .t-desc { font-size: 9px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* Props tab */
  .props-area { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .prop-group { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .prop-group-hd {
    padding: 6px 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .prop-row {
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(30,35,48,0.5);
  }
  .prop-label { font-size: 10px; color: var(--muted); width: 56px; flex-shrink: 0; }
  .prop-slider {
    flex: 1;
    height: 4px;
    appearance: none;
    background: var(--muted2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .prop-slider::-webkit-slider-thumb {
    appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,229,255,0.6);
  }
  .prop-val { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--accent); width: 32px; text-align: right; }

  /* ── TIMELINE ── */
  .timeline-container {
    grid-column: 1 / 4;
    background: var(--timeline);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .timeline-toolbar {
    height: 34px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
  }
  .tl-btn {
    height: 22px;
    padding: 0 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .tl-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .tl-zoom { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .tl-zoom-label { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .zoom-slider {
    width: 70px;
    height: 3px;
    appearance: none;
    background: var(--muted2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .zoom-slider::-webkit-slider-thumb {
    appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
  }
  .timeline-body {
    flex: 1;
    overflow: hidden;
    display: flex;
  }
  .track-labels {
    width: 90px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding-top: 24px;
  }
  .track-label {
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    gap: 5px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .track-label:hover { color: var(--text); }
  .track-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .timeline-tracks {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    position: relative;
    cursor: pointer;
  }
  .timeline-ruler {
    height: 24px;
    position: relative;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  canvas#rulerCanvas { position: absolute; top: 0; left: 0; }
  .playhead-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--accent2);
    left: 0px;
    pointer-events: none;
    z-index: 10;
    box-shadow: 0 0 6px var(--accent2);
    transition: left 0.1s linear;
  }
  .playhead-handle {
    position: absolute;
    top: 0;
    left: -6px;
    width: 12px;
    height: 12px;
    background: var(--accent2);
    clip-path: polygon(50% 100%, 0 0, 100% 0);
    pointer-events: none;
  }
  .tracks-area {
    position: relative;
  }
  .track-row {
    height: 36px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .track-row:nth-child(1) { background: rgba(26,16,64,0.3); }
  .track-row:nth-child(2) { background: rgba(13,26,18,0.3); }
  .track-row:nth-child(3) { background: rgba(26,13,18,0.3); }
  .clip {
    position: absolute;
    top: 3px;
    height: 28px;
    border-radius: 4px;
    cursor: grab;
    display: flex;
    align-items: center;
    padding: 0 8px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    user-select: none;
    transition: filter 0.15s;
    white-space: nowrap;
  }
  .clip:hover { filter: brightness(1.2); }
  .clip:active { cursor: grabbing; }
  .clip.video { background: linear-gradient(90deg, rgba(0,100,180,0.7), rgba(0,60,120,0.5)); }
  .clip.audio { background: linear-gradient(90deg, rgba(0,150,80,0.7), rgba(0,100,50,0.5)); }
  .clip.fx { background: linear-gradient(90deg, rgba(150,0,100,0.7), rgba(100,0,70,0.5)); }
  .clip-waveform {
    position: absolute;
    bottom: 4px;
    left: 8px;
    right: 8px;
    height: 8px;
    opacity: 0.4;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── AI OUTPUT OVERLAY ── */
  .ai-result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,10,15,0.9);
    backdrop-filter: blur(10px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .ai-result-overlay.show { display: flex; }
  .ai-result-modal {
    width: 560px;
    max-height: 80vh;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,229,255,0.05);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-header h3 { font-size: 14px; font-weight: 700; letter-spacing: 1px; }
  .modal-close {
    margin-left: auto;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: var(--text); border-color: var(--text); }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: #a8c8d0;
    white-space: pre-wrap;
  }
  .modal-footer {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    z-index: 300;
    transition: transform 0.3s ease;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast .t-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }

  /* ── LOADING DOTS ── */
  .loading-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 2px;
    animation: blink 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* Responsive */
  @media (max-width: 900px) {
    .workspace { grid-template-columns: 180px 1fr; grid-template-rows: 1fr 1fr 180px; }
    .ai-panel { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">NOVA</div>
  <div class="status-dot"></div>
  <div class="project-name">untitled_project.nova</div>
